version: 2
updates:
  # 1. GitHub Actions (pipeline.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # 2. Frontend npm packages
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # 3. Backend npm packages
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # 4. Root npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
